<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workplace Safety Monitor | Live Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --accent-primary: #3b82f6;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-danger: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
        }

        h1, h2, h3 { font-family: 'Outfit', sans-serif; }

        .container { max-width: 1500px; margin: 0 auto; padding: 1.5rem; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .header-left { display: flex; align-items: center; gap: 20px; }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--accent-primary), #6366f1);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }

        .perf-metrics {
            display: flex; gap: 15px; font-family: monospace; font-size: 0.85rem; color: var(--text-dim);
        }
        .perf-metric span { color: var(--accent-primary); font-weight: 600; }

        .status-area { display: flex; align-items: center; gap: 10px; }
        .status-badge {
            display: flex; align-items: center; gap: 8px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-success);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem; font-weight: 600;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background-color: var(--accent-success);
            box-shadow: 0 0 8px var(--accent-success);
            animation: pulse 2s infinite;
        }

        .badge-disconnected { background: rgba(239, 68, 68, 0.1); color: var(--accent-danger); border-color: rgba(239, 68, 68, 0.2); }
        .dot-disconnected { background-color: var(--accent-danger); box-shadow: 0 0 8px var(--accent-danger); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* Dashboard Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 1.5rem;
        }

        @media (max-width: 1200px) { .dashboard-grid { grid-template-columns: 1fr; } }

        /* Video Section */
        .video-card {
            background: var(--bg-card); border-radius: 20px; border: 1px solid var(--border);
            overflow: hidden; backdrop-filter: blur(12px); position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .video-stream { width: 100%; aspect-ratio: 16/9; background-color: #000; display: block; }
        .video-overlay { position: absolute; top: 1rem; left: 1rem; pointer-events: none; }
        .timestamp-overlay {
            background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 6px;
            font-family: monospace; font-size: 0.8rem;
        }

        /* Stats & Analytics */
        .analytics-panel { display: flex; flex-direction: column; gap: 1.5rem; }
        .card { background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border); padding: 1.25rem; backdrop-filter: blur(12px); }
        .card-title { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 1rem; }

        .stat-main { font-size: 2.5rem; font-weight: 700; font-family: 'Outfit', sans-serif; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

        /* CSS Bar Chart */
        .chart-container { margin-top: 10px; }
        .bar-wrapper {
            height: 12px; background: rgba(255,255,255,0.05); border-radius: 6px;
            display: flex; overflow: hidden; margin-top: 8px;
        }
        .bar-fill { height: 100%; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .bg-green { background: var(--accent-success); box-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }
        .bg-red { background: var(--accent-danger); box-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }
        .bar-labels { display: flex; justify-content: space-between; font-size: 0.75rem; margin-top: 6px; font-weight: 600; }

        /* Personnel Feed */
        .feed-container { max-height: 280px; overflow-y: auto; }
        .feed-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .worker-id { background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; font-weight: 600; color: var(--accent-primary); }
        .status-pill { padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .pill-compliant { background: rgba(16, 185, 129, 0.2); color: var(--accent-success); }
        .pill-partial { background: rgba(245, 158, 11, 0.2); color: var(--accent-warning); }
        .pill-violation { background: rgba(239, 68, 68, 0.2); color: var(--accent-danger); }

        /* Incident Log */
        .log-container { max-height: 250px; overflow-y: auto; font-family: 'Inter', sans-serif; }
        .log-row { 
            padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 0.8rem; 
            display: grid; grid-template-columns: 80px 1fr; gap: 10px;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .log-row.new { background: rgba(59, 130, 246, 0.1); border-left: 3px solid var(--accent-primary); }
        .log-time { color: var(--text-dim); }

        /* Controls */
        .presets { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .preset-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white;
            padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; transition: all 0.2s;
        }
        .preset-btn:hover { background: var(--accent-primary); border-color: var(--accent-primary); }
        
        .input-group { display: flex; gap: 8px; margin-top: 12px; }
        input { flex: 1; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: white; font-family: inherit; }
        .btn-primary { background: var(--accent-primary); color: white; border: none; border-radius: 8px; padding: 10px 18px; font-weight: 600; cursor: pointer; }
        .btn-reconnect { background: var(--accent-warning); color: black; margin-left: 10px; display: none; }
        .btn-clear { float: right; font-size: 0.7rem; background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 2px 8px; border-radius: 4px; cursor: pointer; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                    </div>
                    <h1>PPE MONITOR</h1>
                </div>
                <div class="perf-metrics">
                    <div class="perf-metric">FRAME: <span id="val-frame">0</span></div>
                    <div class="perf-metric">FPS: <span id="val-fps">0.0</span></div>
                </div>
            </div>
            <div class="status-area">
                <div id="connection-status" class="status-badge">
                    <div class="status-dot" id="status-dot"></div>
                    <span id="status-text">SYSTEM LIVE</span>
                </div>
                <button id="reconnect-btn" class="btn-primary btn-reconnect" onclick="reconnect()">RECONNECT</button>
            </div>
        </header>

        <main class="dashboard-grid">
            <!-- Left: Video & Controls -->
            <section>
                <div class="video-card">
                    <img id="stream-img" src="/stream" alt="Live Stream" class="video-stream"
                         onerror="setTimeout(() => { if(this.src.indexOf('/stream') !== -1) this.src='/stream?t='+Date.now(); }, 2000)">
                    <div class="video-overlay">
                        <div class="timestamp-overlay" id="overlay-time">--:--:--</div>
                    </div>
                </div>

                <div class="card" style="margin-top: 1.5rem;">
                    <div class="card-title">Source Configuration</div>
                    <div class="input-group">
                        <input type="text" id="source-input" placeholder="Camera Index, RTSP URL, or File Path">
                        <button class="btn-primary" onclick="updateSource()">Update</button>
                    </div>
                    <div class="presets">
                        <button class="preset-btn" onclick="quickSource('test_videos/veo3_construction.mp4')">🎥 Demo Video</button>
                        <button class="preset-btn" onclick="quickSource('0')">📷 Webcam</button>
                        <button class="preset-btn" onclick="quickSource('rtsp://', true)">📡 RTSP</button>
                    </div>
                </div>
            </section>

            <!-- Right: Analytics -->
            <aside class="analytics-panel">
                <div class="card">
                    <div class="card-title">Real-time Compliance</div>
                    <div class="stat-main" id="count-total">0</div>
                    <div style="font-size: 0.8rem; color: var(--text-dim); margin-top: -5px;">Active Personnel</div>
                    
                    <div class="chart-container">
                        <div class="bar-wrapper">
                            <div id="bar-compliant" class="bar-fill bg-green" style="width: 0%"></div>
                            <div id="bar-violation" class="bar-fill bg-red" style="width: 0%"></div>
                        </div>
                        <div class="bar-labels">
                            <span style="color: var(--accent-success)">Safe: <span id="val-comp-p">0%</span></span>
                            <span style="color: var(--accent-danger)">Risk: <span id="val-viol-p">0%</span></span>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">Incident Log <button class="btn-clear" onclick="clearLog()">Clear Log</button></div>
                    <div class="log-container" id="incident-log">
                        <div style="text-align: center; color: var(--text-dim); padding: 1rem; font-size: 0.8rem;">Monitoring for safety violations...</div>
                    </div>
                </div>

                <div class="card" style="flex: 1;">
                    <div class="card-title">Personnel Feed</div>
                    <div class="feed-container" id="worker-feed">
                        <div style="text-align: center; color: var(--text-dim); padding: 1rem; font-size: 0.8rem;">Waiting for detections...</div>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <script>
        let lastFrameId = 0;
        let lastTimestamp = Date.now();
        let errorCount = 0;
        let isPaused = false;
        let knownViolations = new Set();

        async function fetchStats() {
            if (isPaused) return;
            try {
                const response = await fetch('/stats');
                if (!response.ok) throw new Error();
                const data = await response.json();
                errorCount = 0;
                updateUI(data);
            } catch (error) {
                errorCount++;
                if (errorCount >= 3) {
                    setDisconnected();
                }
            }
        }

        function updateUI(data) {
            // Stats
            const total = data.total_persons || 0;
            const comp = data.compliant || 0;
            const viol = data.violations || 0;
            
            document.getElementById('count-total').innerText = total;
            
            // Bar Chart
            const compP = total > 0 ? (comp / total) * 100 : 0;
            const violP = total > 0 ? (viol / total) * 100 : 0;
            document.getElementById('bar-compliant').style.width = compP + '%';
            document.getElementById('bar-violation').style.width = violP + '%';
            document.getElementById('val-comp-p').innerText = Math.round(compP) + '%';
            document.getElementById('val-viol-p').innerText = Math.round(violP) + '%';

            // Metrics
            const now = Date.now();
            const frameDelta = data.frame_id - lastFrameId;
            const timeDelta = (now - lastTimestamp) / 1000;
            if (timeDelta >= 0.5) {
                const fps = frameDelta / timeDelta;
                document.getElementById('val-fps').innerText = fps.toFixed(1);
                lastFrameId = data.frame_id;
                lastTimestamp = now;
            }
            document.getElementById('val-frame').innerText = data.frame_id;

            if (data.timestamp) {
                document.getElementById('overlay-time').innerText = new Date(data.timestamp * 1000).toLocaleTimeString();
            }

            // Feed & Logs
            updateFeed(data.workers);
        }

        function updateFeed(workers) {
            const feed = document.getElementById('worker-feed');
            const log = document.getElementById('incident-log');
            
            if (!workers || workers.length === 0) {
                feed.innerHTML = '<div style="text-align: center; color: var(--text-dim); padding: 1rem; font-size: 0.8rem;">No personnel detected</div>';
                return;
            }

            feed.innerHTML = '';
            workers.forEach(w => {
                // Item
                const item = document.createElement('div');
                item.className = 'feed-item';
                    const safeStatus = ['compliant','partial','violation'].includes(w.status) ? w.status : 'violation';
                    item.innerHTML = `
                        <div class="worker-id">#${w.id}</div>
                        <div style="flex: 1">H: ${w.helmet ? '✅' : '❌'} &nbsp; V: ${w.vest ? '✅' : '❌'}</div>
                        <div class="status-pill pill-${safeStatus}">${safeStatus}</div>
                    `;
                feed.appendChild(item);

                // Log violations
                if (w.status !== 'compliant') {
                    addLogEntry(w);
                }
            });
        }

        function addLogEntry(worker) {
            const log = document.getElementById('incident-log');
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            
            // Minimal simple de-bounce: don't log if the same ID was logged in last 3 seconds
            const logKey = `${worker.id}-${worker.status}`;
            if (knownViolations.has(logKey)) return;
            
            knownViolations.add(logKey);
            setTimeout(() => knownViolations.delete(logKey), 5000);

            // Remove placeholder
            if (log.innerText.includes('Monitoring')) log.innerHTML = '';

            const row = document.createElement('div');
            row.className = 'log-row new';
            row.innerHTML = `<span class="log-time">${time}</span> <span><b>ID #${worker.id}</b>: PPE ${worker.status} detected</span>`;
            
            log.prepend(row);
            setTimeout(() => row.classList.remove('new'), 2000);

            // Cap at 50
            if (log.children.length > 50) log.lastElementChild.remove();
        }

        function setDisconnected() {
            isPaused = true;
            const badge = document.getElementById('connection-status');
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            const btn = document.getElementById('reconnect-btn');

            badge.classList.add('badge-disconnected');
            dot.classList.add('dot-disconnected');
            text.innerText = '⚠️ STREAM DISCONNECTED';
            btn.style.display = 'block';
        }

        function reconnect() {
            isPaused = false;
            errorCount = 0;
            const badge = document.getElementById('connection-status');
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            const btn = document.getElementById('reconnect-btn');

            badge.classList.remove('badge-disconnected');
            dot.classList.remove('dot-disconnected');
            text.innerText = 'SYSTEM LIVE';
            btn.style.display = 'none';
            
            // Refresh stream img
            document.getElementById('stream-img').src = '/stream?t=' + Date.now();
        }

        function clearLog() {
            document.getElementById('incident-log').innerHTML = '<div style="text-align: center; color: var(--text-dim); padding: 1rem; font-size: 0.8rem;">Monitoring for safety violations...</div>';
            knownViolations.clear();
        }

        function quickSource(val, focus = false) {
            const input = document.getElementById('source-input');
            input.value = val;
            if (focus) input.focus();
            else updateSource();
        }

        async function updateSource() {
            const source = document.getElementById('source-input').value.trim();
            if (!source) return;
            try {
                await fetch('/source', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ source })
                });
                reconnect();
            } catch (e) { alert('Update failed'); }
        }

        setInterval(fetchStats, 500);
    </script>
</body>
</html>
